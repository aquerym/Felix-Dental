name: Deploy to GitHub Pages

on:
  # Deploy when code is pushed to the default branch.
  push:
    branches:
      - main
  # Allow manual deployments from the Actions tab.
  workflow_dispatch:

# Ensure only one deployment runs at a time.
concurrency:
  group: pages
  cancel-in-progress: true

# Minimal permissions required by GitHub Pages actions.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check out repository contents.
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Node runtime for install/build steps.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install dependencies exactly as locked.
      - name: Install dependencies
        run: npm ci

      # Build static assets for GitHub Pages artifact upload.
      - name: Build
        run: npm run build

      # Upload Vite build output for deployment.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Deploy uploaded artifact to GitHub Pages.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
